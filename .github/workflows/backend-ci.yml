name: Backend CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dev dependencies
        run: pip install --no-cache-dir -e ".[dev]"

      - name: ruff
        run: ruff check .

      - name: black
        run: black --check .

      - name: isort
        run: isort --check-only .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: auction_test
          POSTGRES_USER: auction
          POSTGRES_PASSWORD: auction
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://auction:auction@localhost:5432/auction_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-not-used-in-production-64chars-padding-here
      APP_ENV: test
      APP_URL: http://localhost:8000
      SERVER_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:5173
      MAIL_FROM: noreply@test.com
      CLOUDINARY_CLOUD_NAME: test
      CLOUDINARY_API_KEY: test
      CLOUDINARY_API_SECRET: test
      CLOUDINARY_UPLOAD_PRESET: test
      PAYSTACK_SECRET_KEY: test
      PAYSTACK_PUBLIC_KEY: test
      PAYSTACK_BASE_URL: https://api.paystack.co
      RESEND_API_KEY: test
      SHIPPING_DEADLINE: 48

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install --no-cache-dir -e ".[dev]"

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests with coverage
        run: pytest --cov=. --cov-report=xml --cov-fail-under=70 -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r <(pip install -e "." --dry-run 2>/dev/null | grep "Would install" | sed 's/Would install //' | tr ' ' '\n' | sed 's/-\([0-9]\)/==\1/') || true
        # Non-blocking for now — remove '|| true' when you want it to fail PRs on vulnerabilities
